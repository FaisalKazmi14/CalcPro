  <rect x="24" y="24" width="464" height="464" rx="128" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#shine)"/>

  <g transform="translate(0,4)">
    <path d="M146 320L256 126L366 320" fill="none" stroke="url(#glass)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M180 238H332" fill="none" stroke="url(#glass)" stroke-width="30" stroke-linecap="round"/>
    <circle cx="356" cy="150" r="18" fill="#ffffff" fill-opacity=".95"/>
  </g>

  <g fill="#fff" fill-opacity=".92" font-family="Inter, Arial, sans-serif" font-weight="900">
    <text x="256" y="404" text-anchor="middle" font-size="38">∑  π  ÷</text>
  </g>

  <rect x="94" y="94" width="324" height="324" rx="84" fill="none" stroke="#ffffff" stroke-opacity=".12" stroke-width="2"/>
