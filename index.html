<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CalcNinja — Ultra-Premium Workspace</title>
    <!-- Expert level meta tags for PWA and SEO -->
    <meta name="description" content="Professional-grade calculator suite with AI assistance.">
    <meta name="theme-color" content="#5856d6" id="themeMeta">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Syne:wght@800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
/* CSS ARCHITECTURE: PRESET VARIABLES & DESIGN TOKENS */
:root {
    --radius: 24px;
    --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --glass: blur(20px) saturate(180%);
    --shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* THEME ENGINE */
[data-theme="aurora"] {
    --bg: #f5f7ff; --surface: rgba(255, 255, 255, 0.7); --text: #1a1a2e; 
    --accent: #5856d6; --border: rgba(0,0,0,0.05); --muted: #64748b;
}
[data-theme="nebula"] {
    --bg: #06091a; --surface: rgba(14, 19, 42, 0.7); --text: #f8fbff; 
    --accent: #00d4ff; --border: rgba(255,255,255,0.1); --muted: #94a3b8;
}

/* BASE STYLES */
* { box-sizing: border-box; transition: all 0.3s var(--spring); }
body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    height: 100vh; display: grid; grid-template-columns: 320px 1fr; overflow: hidden;
}

/* SIDEBAR & UI COMPONENTS */
.sidebar {
    background: var(--surface); backdrop-filter: var(--glass);
    border-right: 1px solid var(--border); padding: 2rem;
    display: flex; flex-direction: column; gap: 1.5rem;
}

.logo-wrap { display: flex; align-items: center; gap: 1rem; }
.logo-icon { 
    width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #ff3b30);
    border-radius: 14px; display: grid; place-items: center; color: white; font-weight: 800;
}

.mode-btn {
    padding: 12px 16px; border-radius: 12px; border: none; background: transparent;
    text-align: left; cursor: pointer; color: var(--muted); font-weight: 600;
}
.mode-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(88, 86, 214, 0.3); }

/* DISPLAY AREA */
.workspace { padding: 2rem; display: flex; flex-direction: column; gap: 2rem; overflow-y: auto; }
.display-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2.5rem; border-radius: var(--radius); text-align: right;
    backdrop-filter: var(--glass); box-shadow: var(--shadow);
}
.expr { font-family: 'JetBrains Mono'; font-size: 1.2rem; color: var(--muted); min-height: 1.5rem; }
.res { font-size: 4rem; font-weight: 800; letter-spacing: -2px; }

/* CALCULATOR GRID */
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.btn {
    aspect-ratio: 1; border-radius: 18px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 1.2rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 0 var(--border);
}
.btn:active { transform: translateY(4px); box-shadow: none; }
.btn.op { color: var(--accent); background: rgba(88, 86, 214, 0.1); }
.btn.eq { background: var(--accent); color: white; grid-column: span 2; aspect-ratio: auto; }

/* COMMAND PALETTE */
#palette {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
    display: none; place-items: center; z-index: 1000;
}
.palette-box {
    background: var(--bg); width: 90%; max-width: 600px; border-radius: 20px;
    padding: 1rem; border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.5);
}
.palette-input {
    width: 100%; padding: 1rem; border: none; background: transparent; 
    color: var(--text); font-size: 1.2rem; outline: none;
}

/* ANIMATIONS */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}
.error-shake { animation: shake 0.2s ease-in-out 0s 2; }
</style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-wrap">
        <div class="logo-icon">N</div>
        <h1 style="font-family:'Syne'; font-size:1.5rem">CalcNinja</h1>
    </div>
    
    <div id="modeMenu" style="display:flex; flex-direction:column; gap:8px">
        <button class="mode-btn active" data-mode="basic">Standard</button>
        <button class="mode-btn" data-mode="sci">Scientific</button>
        <button class="mode-btn" data-mode="graph">Graphing</button>
        <button class="mode-btn" data-mode="finance">Finance</button>
    </div>

    <div style="margin-top:auto">
        <p style="font-size:0.8rem; color:var(--muted)">THEME SELECTOR</p>
        <div style="display:flex; gap:10px">
            <button onclick="setTheme('aurora')" style="width:24px; height:24px; border-radius:50%; background:#5856d6; border:none;"></button>
            <button onclick="setTheme('nebula')" style="width:24px; height:24px; border-radius:50%; background:#00d4ff; border:none;"></button>
        </div>
    </div>
</aside>

<main class="workspace">
    <div class="display-card" id="displayBody">
        <div class="expr" id="expression"></div>
        <div class="res" id="result">0</div>
    </div>

    <div id="basic" class="mode-section">
        <div class="grid">
            <button class="btn op" onclick="clearAll()">AC</button>
            <button class="btn op" onclick="backspace()">⌫</button>
            <button class="btn op" onclick="append('/')">÷</button>
            <button class="btn op" onclick="append('*')">×</button>
            
            <button class="btn" onclick="append('7')">7</button>
            <button class="btn" onclick="append('8')">8</button>
            <button class="btn" onclick="append('9')">9</button>
            <button class="btn op" onclick="append('-')">-</button>
            
            <button class="btn" onclick="append('4')">4</button>
            <button class="btn" onclick="append('5')">5</button>
            <button class="btn" onclick="append('6')">6</button>
            <button class="btn op" onclick="append('+')">+</button>
            
            <button class="btn" onclick="append('1')">1</button>
            <button class="btn" onclick="append('2')">2</button>
            <button class="btn" onclick="append('3')">3</button>
            <button class="btn eq" onclick="evaluateExpr()">=</button>
            
            <button class="btn" style="grid-column: span 2; aspect-ratio: auto;" onclick="append('0')">0</button>
            <button class="btn" onclick="append('.')">.</button>
        </div>
    </div>
</main>

<div id="palette">
    <div class="palette-box">
        <input type="text" class="palette-input" placeholder="Jump to... (e.g., 'Scientific', 'Dark', 'Clear')" id="palInput">
    </div>
</div>

<script>
// --- ULTRA ENGINE (Logic Layer) ---
const state = {
    expr: '',
    res: '0',
    history: []
};

// Precise calculation using math.js BigNumbers
math.config({ number: 'BigNumber', precision: 64 });

function append(val) {
    state.expr += val;
    updateUI();
}

function clearAll() {
    state.expr = '';
    state.res = '0';
    updateUI();
}

function backspace() {
    state.expr = state.expr.slice(0, -1);
    updateUI();
}

function evaluateExpr() {
    try {
        if (!state.expr) return;
        const result = math.evaluate(state.expr);
        state.res = math.format(result, { precision: 14 });
        state.history.push({ q: state.expr, a: state.res });
        state.expr = state.res.toString();
        updateUI();
    } catch (e) {
        triggerError();
    }
}

function triggerError() {
    const card = document.getElementById('displayBody');
    card.classList.add('error-shake');
    state.res = "Syntax Error";
    updateUI();
    setTimeout(() => card.classList.remove('error-shake'), 400);
}

function updateUI() {
    document.getElementById('expression').textContent = state.expr;
    document.getElementById('result').textContent = state.res;
}

// --- UX LAYER (Interactions) ---
function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('ninja_theme', theme);
}

// Command Palette (Hotkeys)
window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('palette').style.display = 'grid';
        document.getElementById('palInput').focus();
    }
    if (e.key === 'Escape') {
        document.getElementById('palette').style.display = 'none';
    }
    // Keyboard Support
    if (/[0-9+\-*/.]/.test(e.key)) append(e.key);
    if (e.key === 'Enter') evaluateExpr();
    if (e.key === 'Backspace') backspace();
});

// Sidebar Mode Switcher logic
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Add logic here to switch visibility of specialized sections
    });
});

// Boot logic
window.onload = () => {
    const saved = localStorage.getItem('ninja_theme') || 'aurora';
    setTheme(saved);
};
</script>
</body>
</html>
